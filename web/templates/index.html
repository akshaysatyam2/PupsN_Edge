<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PupsN Vision System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-blue-400">PupsN Vision System</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Main Video Feed -->
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg flex justify-between items-center">
                    <h2 class="text-xl font-semibold text-blue-300">Live Stream</h2>
                    <div class="flex items-center space-x-2">
                        <label class="text-sm text-gray-400">Viewing Camera:</label>
                        <select id="view-camera-select" class="bg-gray-900 border border-gray-700 rounded p-1 text-white outline-none focus:border-blue-500"></select>
                    </div>
                </div>
                
                <div class="bg-black rounded-xl overflow-hidden shadow-2xl relative border border-gray-700 aspect-square">
                    <canvas id="videoCanvas" width="640" height="640" class="w-full h-full object-cover"></canvas>
                    <div id="status-overlay" class="absolute top-4 left-4 bg-red-600 text-white px-3 py-1 rounded font-bold text-sm hidden">
                        Inactive / Reconnecting...
                    </div>
                </div>
            </div>
            
            <!-- Diagnostics & Forms -->
            <div class="space-y-6">
                <!-- Diagnostics Panel -->
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                    <h2 class="text-xl font-semibold mb-4 text-green-400 border-b border-gray-700 pb-2">Live Diagnostics</h2>
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-gray-400">System Time</span>
                        <span id="sys-time" class="font-mono text-sm">--:--:--</span>
                    </div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-gray-400">Inference Latency</span>
                        <span id="inf-latency" class="font-mono text-yellow-400 font-bold">0.00 ms</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">Active Camera ID</span>
                        <span id="active-cam-id" class="font-mono text-blue-300">--</span>
                    </div>
                </div>

                <!-- Registration Form -->
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                    <h2 class="text-xl font-semibold mb-4 text-purple-400 border-b border-gray-700 pb-2">Register Pet Profile</h2>
                    <form id="register-form" class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Camera ID</label>
                            <select id="register-camera-select" name="camera_id" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white outline-none focus:border-purple-500"></select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Pet Name</label>
                            <input type="text" name="pet_name" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white outline-none focus:border-purple-500" placeholder="e.g. Buster" required>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Profile Photos (Up to 5, 1 Dog Only per photo)</label>
                            <input type="file" name="images" accept="image/*" multiple max="5" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-gray-700 file:text-white hover:file:bg-gray-600" required>
                            <p class="text-xs text-gray-500 mt-1">Select up to 5 photos to create a more robust profile.</p>
                        </div>
                        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded transition">Register Pet</button>
                    </form>
                    <div id="register-status" class="mt-3 text-sm hidden"></div>
                </div>

                <!-- Add/Manage Camera Form -->
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                    <h2 class="text-xl font-semibold mb-4 text-orange-400 border-b border-gray-700 pb-2">Manage Cameras</h2>
                    <ul id="camera-list" class="mb-4 space-y-2 max-h-32 overflow-y-auto">
                        <!-- Camera items will be injected here -->
                    </ul>
                    <hr class="border-gray-700 mb-4">
                    <form id="add-camera-form" class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Stream Name</label>
                            <input type="text" id="cam-name" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white outline-none focus:border-orange-500" placeholder="e.g. Living Room" required>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Stream URL (or digit for USB)</label>
                            <input type="text" id="cam-url" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white outline-none focus:border-orange-500" placeholder="e.g. 0 or rtsp://..." required>
                        </div>
                        <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded transition">Add Camera</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const statusOverlay = document.getElementById('status-overlay');
        
        const sysTimeEl = document.getElementById('sys-time');
        const infLatencyEl = document.getElementById('inf-latency');
        const activeCamIdEl = document.getElementById('active-cam-id');
        
        let targetCameraId = null;

        document.getElementById('view-camera-select').addEventListener('change', (e) => {
            targetCameraId = parseInt(e.target.value);
            // Clear canvas when switching cameras
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            statusOverlay.classList.remove('hidden');
        });

        // Load cameras on start
        async function loadCameras() {
            try {
                const res = await fetch('/cameras');
                const cameras = await res.json();
                
                const viewSelect = document.getElementById('view-camera-select');
                const regSelect = document.getElementById('register-camera-select');
                const camList = document.getElementById('camera-list');
                
                viewSelect.innerHTML = '';
                regSelect.innerHTML = '';
                camList.innerHTML = '';
                
                cameras.forEach(cam => {
                    const optText = `${cam.name} (ID: ${cam.id})`;
                    
                    const opt1 = document.createElement('option');
                    opt1.value = cam.id;
                    opt1.textContent = optText;
                    viewSelect.appendChild(opt1);
                    
                    const opt2 = document.createElement('option');
                    opt2.value = cam.id;
                    opt2.textContent = optText;
                    regSelect.appendChild(opt2);
                    
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center bg-gray-900 p-2 rounded text-sm";
                    li.innerHTML = `
                        <span class="truncate pr-2">${optText}</span>
                        <button onclick="deleteCamera(${cam.id})" class="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-xs">Del</button>
                    `;
                    camList.appendChild(li);
                });

                if (cameras.length > 0) {
                    // Update targetCameraId only if it's currently null or no longer exists
                    if (targetCameraId === null || !cameras.some(c => c.id === targetCameraId)) {
                        targetCameraId = cameras[0].id;
                    }
                    viewSelect.value = targetCameraId;
                    regSelect.value = targetCameraId;
                } else {
                    targetCameraId = null;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    statusOverlay.classList.remove('hidden');
                    statusOverlay.textContent = 'No Cameras Available';
                }
            } catch (err) {
                console.error("Failed to load cameras", err);
            }
        }
        
        async function deleteCamera(id) {
            if (!confirm("Are you sure you want to delete this camera?")) return;
            try {
                const res = await fetch(`/delete_camera/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadCameras();
                } else {
                    alert("Failed to delete camera.");
                }
            } catch (err) {
                console.error(err);
            }
        }

        loadCameras();

        // Handle Socket IO
        socket.on('stream_update', (data) => {
            // Drop frames from background threads that aren't our target camera
            if (data.camera_id !== targetCameraId) return;

            if (data.status === 'inactive') {
                statusOverlay.classList.remove('hidden');
                statusOverlay.textContent = 'Inactive / Reconnecting...';
                return;
            }
            statusOverlay.classList.add('hidden');
            
            // Render Image (Backend now draws the bounding boxes directly onto the frame!)
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = data.image;

            // Update Metrics
            if (data.metrics) {
                sysTimeEl.textContent = data.metrics.system_timestamp;
                infLatencyEl.textContent = `${data.metrics.inference_latency_ms} ms`;
            }
            activeCamIdEl.textContent = data.camera_id;
        });

        // Add Camera Submit
        document.getElementById('add-camera-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('cam-name').value;
            const url = document.getElementById('cam-url').value;
            try {
                const res = await fetch('/add_camera', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({stream_name: name, stream_url: url})
                });
                if(res.ok) {
                    document.getElementById('cam-name').value = '';
                    document.getElementById('cam-url').value = '';
                    loadCameras();
                }
            } catch(err) {
                console.error(err);
                alert("Failed to add camera.");
            }
        });

        // Register Pet Submit
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const statusEl = document.getElementById('register-status');
            statusEl.classList.remove('hidden', 'text-green-400', 'text-red-400');
            statusEl.textContent = 'Uploading & Running OSNet...';
            statusEl.classList.add('text-blue-400');
            statusEl.classList.remove('hidden');
            
            try {
                const res = await fetch('/register_pet', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                statusEl.classList.remove('text-blue-400');
                if(res.ok) {
                    statusEl.textContent = data.message;
                    statusEl.classList.add('text-green-400');
                    e.target.reset();
                } else {
                    statusEl.textContent = data.error;
                    statusEl.classList.add('text-red-400');
                }
            } catch(err) {
                console.error(err);
                statusEl.classList.remove('text-blue-400');
                statusEl.textContent = "Network error during registration.";
                statusEl.classList.add('text-red-400');
            }
        });
    </script>
</body>
</html>
